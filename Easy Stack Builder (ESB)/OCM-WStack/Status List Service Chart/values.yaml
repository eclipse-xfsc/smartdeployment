status-list-service:
  replicaCount: 1
  name: status-list-service

  image:
    repository: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/ocm-wstack
    name: status-list-service
    # -- Image tag
    # Uses .Chart.AppVersion if empty
    #tag: "main"
    tag: "latest"
    # -- Image sha, usually generated by the CI
    # Uses image.tag if empty
    sha: ""
    # -- Image pull policy
    pullPolicy: Always
    # -- Image pull secret when internal image is used
    pullSecrets: key

  podAnnotations: {}

  # --------------------------------------------------------------------
  # Workaround: upstream dependency chart renders invalid container fields
  # (prevents Kubernetes error: containers[].requests not declared in schema)
  # --------------------------------------------------------------------
  resources: null
  requests: null
  limits: null

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/configuration-snippet: |
        proxy_set_header X-DID did:web:cloud-wallet.DOMAIN;
        proxy_set_header X-NAMESPACE tenant_space;
        proxy_set_header X-KEY signerkey;
        proxy_set_header X-GROUP "";
        proxy_set_header X-HOST cloud-wallet.DOMAIN;
        proxy_set_header X-TYPE StatusList2021;
      nginx.ingress.kubernetes.io/rewrite-target: /v1/tenants/tenant_space/status/$2
    hosts:
      - host: cloud-wallet.DOMAIN
        paths:
          - path: /api/status(/|$)(.*)
            port: 8080
            pathType: ImplementationSpecific

    tls:
      - secretName: xfsc-wildcard
        hosts:
          - cloud-wallet.DOMAIN

  config:
    messaging:
      protocol: nats
      nats:
        url: nats://nats.NAMESPACE.svc.cluster.local:4222
        timeoutInSec: 10s
        queueGroup: statuslistservice

    servingPort: 8080

    database:
      secretName: statuslist-db-secret
      userkey: postgresql-username
      passwordKey: postgresql-password
      host: postgres-postgresql.NAMESPACE.svc.cluster.local
      port: 5432
      db: status
      params: "sslmode:disable"

    creationTopic: status
    listSizeInBytes: 125000
    signerTopic: signer

  postgresql:
    auth:
      username: user
      database: status
