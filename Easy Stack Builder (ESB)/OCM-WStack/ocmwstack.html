<!-- Editor UI for OCM-W-Stack node -->
<script type="text/x-red" data-template-name="OCM-W-Stack">
  <style>
    .form-row { display:flex; align-items:center; margin-bottom:10px; }
    .form-row label { width:160px!important; margin-right:10px; text-align:right; }
    .form-row input[type="text"], .form-row input[type="email"] { flex:1; }
    .ocm-tabs { display:flex; gap:8px; margin:6px 0 14px 170px; }
    .ocm-tab-button.active { background:#dcecf6; border-color:#8aaec4; }
    .ocm-tab-panel { display:none; border-left:2px solid #e6e6e6; padding-left:12px; margin-left:168px; }
    .ocm-tab-panel.active { display:block; }
    .ocm-tab-panel .form-row { margin-left:-168px; }
    .ocm-hint { margin:0 0 10px 170px; font-size:12px; color:#666; }
    .ocm-hint.warning { color:#b35f00; }
  </style>

  <div class="form-row">
    <label for="node-input-name">Node label</label>
    <input type="text" id="node-input-name" placeholder="(optional) Display name in flow">
  </div>

  <div class="ocm-tabs">
    <button type="button" class="red-ui-button ocm-tab-button active" data-target="instance">Instance Info</button>
    <button type="button" class="red-ui-button ocm-tab-button" data-target="k8s">Kubernetes &amp; Domain</button>
    <button type="button" class="red-ui-button ocm-tab-button" data-target="keycloak">Keycloak &amp; Credentials</button>
  </div>

  <div class="ocm-hint" id="ocm-domain-hint">Use a bare FQDN such as apps.example.com. The node deploys cloud-wallet.&lt;domain&gt; and auth-cloud-wallet.&lt;domain&gt;.</div>

  <div class="ocm-tab-panel active" data-panel="instance">
    <div class="form-row">
      <label for="node-input-instanceName">Instance name</label>
      <input type="text" id="node-input-instanceName" placeholder="e.g. demo-01">
    </div>
  </div>

  <div class="ocm-tab-panel" data-panel="k8s">
    <div class="form-row">
      <label for="node-input-domainAddress">Domain</label>
      <input type="text" id="node-input-domainAddress" placeholder="e.g. apps.example.com">
    </div>

    <div class="form-row">
      <label for="node-input-kubeconfig">kubeconfig</label>
      <input type="file" id="node-input-kubeconfig" accept=".yml,.yaml,.conf,.txt">
      <input type="hidden" id="node-input-kubeconfigContent">
    </div>
  </div>

  <div class="ocm-tab-panel" data-panel="keycloak">
    <div class="form-row">
      <label for="node-input-emailAddress">Email</label>
      <input type="email" id="node-input-emailAddress" placeholder="e.g. admin@example.com">
    </div>

    <div class="form-row">
      <label for="node-input-privateKey">TLS Private Key</label>
      <input type="file" id="node-input-privateKey" accept=".key,.pem,.txt">
      <input type="hidden" id="node-input-privateKeyContent">
    </div>

    <div class="form-row">
      <label for="node-input-certificate">TLS Certificate</label>
      <input type="file" id="node-input-certificate" accept=".crt,.pem,.cer,.txt">
      <input type="hidden" id="node-input-certificateContent">
    </div>
  </div>
</script>

<script type="text/javascript">
(function() {
  function setupFile(fieldFile, fieldHidden) {
    var inp = $("#node-input-" + fieldFile)[0];
    if (!inp) return;
    inp.addEventListener("change", function() {
      var f = this.files && this.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        $("#node-input-" + fieldHidden).val(e.target.result);
      };
      reader.readAsText(f);
    });
  }

  function activateTab(target) {
    $(".ocm-tab-button").removeClass("active");
    $(".ocm-tab-button[data-target='" + target + "']").addClass("active");
    $(".ocm-tab-panel").removeClass("active");
    $(".ocm-tab-panel[data-panel='" + target + "']").addClass("active");
  }

  function validateDomain() {
    var value = $("#node-input-domainAddress").val().trim();
    var hint = $("#ocm-domain-hint");
    var valid = !value || (!/^https?:\/\//i.test(value) && value.indexOf("/") === -1 && /^([A-Za-z0-9]([A-Za-z0-9-]{0,61}[A-Za-z0-9])?\.)+[A-Za-z]{2,63}$/.test(value));
    hint.toggleClass("warning", !valid);
    if (valid) {
      hint.text("Use a bare FQDN such as apps.example.com. The node deploys cloud-wallet.<domain> and auth-cloud-wallet.<domain>.");
    } else {
      hint.text("Domain must be a bare FQDN without scheme or path.");
    }
    return valid;
  }

  RED.nodes.registerType('OCM-W-Stack', {
    category: 'FAPs',
    color: '#c0deed',
    icon: 'bridge.svg',
    defaults: {
      name:               { value: "" },
      instanceName:       { value: "", required: true },
      domainAddress:      { value: "", required: true },
      emailAddress:       { value: "", required: true },
      kubeconfigContent:  { value: "", required: true },
      privateKeyContent:  { value: "", required: true },
      certificateContent: { value: "", required: true }
    },
    inputs: 1,
    outputs: 1,
    label: function() {
      return this.name || this.instanceName || "OCM-W-Stack";
    },
    oneditprepare: function() {
      setupFile("kubeconfig", "kubeconfigContent");
      setupFile("privateKey", "privateKeyContent");
      setupFile("certificate", "certificateContent");
      $(".ocm-tab-button").off("click.ocm").on("click.ocm", function(evt) {
        evt.preventDefault();
        activateTab($(this).data("target"));
      });
      $("#node-input-domainAddress").off("input.ocm blur.ocm").on("input.ocm blur.ocm", validateDomain);
      activateTab("instance");
      validateDomain();
    },
    oneditsave: function() {
      if (!validateDomain()) {
        RED.notify("Domain should be a bare hostname (no scheme or path).", "warning");
      }
    }
  });
})();
</script>
