<script type="text/x-red" data-template-name="tsastack">
  <style>
    .form-row { display:flex; align-items:center; margin-bottom:10px; }
    .form-row label { width:190px!important; margin-right:10px; text-align:right; }
    .form-row input[type="text"],
    .form-row input[type="email"],
    .form-row input[type="password"] { flex:1; }
    .form-row .checkbox-wrap { flex:1; display:flex; align-items:center; gap:8px; }
    .hint { margin: 6px 0 14px 200px; color: #666; font-size: 12px; }
  </style>

  <div class="form-row">
    <label for="node-input-instanceName">TSA namespace</label>
    <input type="text" id="node-input-instanceName" placeholder="e.g. tsa-demo">
  </div>

  <div class="form-row">
    <label for="node-input-ocmwNamespace">OCMW namespace</label>
    <input type="text" id="node-input-ocmwNamespace" placeholder="e.g. ocmwstack">
  </div>
  <div class="hint">Shared OCMW services such as Keycloak, signer, NATS, and resolver are reused from this namespace via cluster DNS.</div>

  <div class="form-row">
    <label for="node-input-domainAddress">Base domain</label>
    <input type="text" id="node-input-domainAddress" placeholder="e.g. apps.example.com">
  </div>
  <div class="hint">The deployer exposes the TSA entrypoints on one host: <code>&lt;tsa-namespace&gt;.&lt;base-domain&gt;</code>.</div>

  <div class="form-row">
    <label for="node-input-emailAddress">Email</label>
    <input type="email" id="node-input-emailAddress" placeholder="optional">
  </div>

  <div class="form-row">
    <label for="node-input-ocmAddress">OCM address</label>
    <input type="text" id="node-input-ocmAddress" placeholder="optional, defaults to https://cloud-wallet.&lt;base-domain&gt;">
  </div>

  <div class="form-row">
    <label for="node-input-kubeconfig">kubeconfig</label>
    <input type="file" id="node-input-kubeconfig" accept=".yml,.yaml,.conf,.txt">
    <input type="hidden" id="node-input-kubeconfigContent">
  </div>

  <div class="form-row">
    <label for="node-input-privateKey">TLS private key</label>
    <input type="file" id="node-input-privateKey" accept=".key,.pem,.txt">
    <input type="hidden" id="node-input-privateKeyContent">
  </div>

  <div class="form-row">
    <label for="node-input-certificate">TLS certificate</label>
    <input type="file" id="node-input-certificate" accept=".crt,.pem,.cer,.txt">
    <input type="hidden" id="node-input-certificateContent">
  </div>

  <div class="form-row">
    <label for="node-input-registryImagePrefix">Registry image prefix</label>
    <input type="text" id="node-input-registryImagePrefix" placeholder="e.g. ghcr.io/myorg/tsa">
  </div>

  <div class="form-row">
    <label for="node-input-registryUserName">Registry username</label>
    <input type="text" id="node-input-registryUserName" placeholder="e.g. ci-bot">
  </div>

  <div class="form-row">
    <label for="node-input-registryPassword">Registry password</label>
    <input type="password" id="node-input-registryPassword" placeholder="••••••••">
  </div>

  <div class="form-row">
    <label for="node-input-deployLegacyLogin">Deploy TSA login</label>
    <div class="checkbox-wrap">
      <input type="checkbox" id="node-input-deployLegacyLogin" style="width:auto;">
      <span>Deploy the legacy TSA login flow and expose it under the shared TSA host.</span>
    </div>
  </div>

  <div class="form-row">
    <label for="node-input-name">Node label</label>
    <input type="text" id="node-input-name" placeholder="(optional) Display name in flow">
  </div>
</script>

<script type="text/javascript">
(function() {
  function setupFile(fieldFile, fieldHidden) {
    var inp = $("#node-input-" + fieldFile)[0];
    if (!inp) return;
    inp.addEventListener("change", function() {
      var f = this.files && this.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        $("#node-input-" + fieldHidden).val(e.target.result);
      };
      reader.readAsText(f);
    });
  }

  RED.nodes.registerType('tsastack', {
    category: 'FAPs',
    color: '#c0deed',
    icon: 'bridge.svg',
    defaults: {
      name: { value: "" },
      instanceName: { value: "", required: true },
      ocmwNamespace: { value: "", required: true },
      domainAddress: { value: "", required: true },
      emailAddress: { value: "" },
      ocmAddress: { value: "" },
      certificateContent: { value: "", required: true },
      privateKeyContent: { value: "", required: true },
      kubeconfigContent: { value: "", required: true },
      registryImagePrefix: { value: "", required: true },
      registryUserName: { value: "", required: true },
      registryPassword: { value: "", required: true },
      deployLegacyLogin: { value: true }
    },
    inputs: 1,
    outputs: 1,
    label: function() {
      return this.name || this.instanceName || 'TSA Stack';
    },
    oneditprepare: function() {
      setupFile('kubeconfig', 'kubeconfigContent');
      setupFile('privateKey', 'privateKeyContent');
      setupFile('certificate', 'certificateContent');
    },
    oneditsave: function() {
      var domain = $("#node-input-domainAddress").val().trim();
      if (domain.startsWith("http://") || domain.startsWith("https://") || domain.includes("/")) {
        RED.notify("Base domain should be a bare hostname with no scheme or path.", "warning");
      }
    }
  });
})();
</script>
